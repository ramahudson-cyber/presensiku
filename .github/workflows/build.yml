name: Build APK & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/siap-release-key.keystore

      - name: Build APK (release)
        env:
          KEYSTORE_PATH: siap-release-key.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK sebagai artifact (download manual dari GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: SIAP-Puskesmas-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Deploy ke Vercel (web app only)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes

      - name: Upload APK ke GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v1.6.5"
          name: "SIAP Puskesmas v1.6.5"
          bodyFile: public/release-notes.txt
          artifacts: "android/app/build/outputs/apk/release/app-release.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          replacesArtifacts: true
