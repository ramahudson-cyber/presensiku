name: Build APK & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/siap-release-key.keystore

      - name: Build APK (release)
        env:
          KEYSTORE_PATH: siap-release-key.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK sebagai artifact (download manual dari GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: SIAP-Puskesmas-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Build Vercel output locally
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel build --prod --token $VERCEL_TOKEN --yes

      - name: Copy APK & bundle ke output Vercel
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk .vercel/output/static/SIAP-Puskesmas.apk
          cp public/bundle.zip .vercel/output/static/bundle.zip 2>/dev/null; true

      - name: Deploy ke Vercel (prebuilt — include APK)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prebuilt --prod --token $VERCEL_TOKEN --yes

      - name: Extract version name
        id: version
        run: echo "name=v$(grep versionName android/app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_OUTPUT

      - name: Create/Update GitHub Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: "SIAP Puskesmas ${{ steps.version.outputs.name }}"
          body_path: public/release-notes.txt
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
          generate_release_notes: true
