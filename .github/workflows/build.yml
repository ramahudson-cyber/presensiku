name: Build APK & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK sebagai artifact (download manual dari GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: SIAP-Puskesmas-APK-v1.2.1
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Copy APK ke public untuk deploy
        run: cp android/app/build/outputs/apk/debug/app-debug.apk public/SIAP-Puskesmas.apk

      - name: Deploy ke Vercel (web + APK)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes
