<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: radial-gradient(circle at top left, #33004D, #060311);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #fff; padding: 20px;
  }
  .app { max-width:400px; margin:0 auto; display:flex; flex-direction:column; gap:24px; }
  
  /* Hero */
  .hero { 
    background: linear-gradient(135deg, #660099, #060311);
    border-radius: 24px; padding: 20px; color: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  
  /* Glass Card */
  .card-glass { 
    background: rgba(255,255,255,0.04); backdrop-filter: blur(12px);
    border-radius: 24px; padding: 16px; border: 1px solid rgba(255,255,255,0.06);
  }
  .lb { font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

  /* Timeline */
  .tl { position:relative; }
  .tl-l { position:absolute; left:15px; top:8px; bottom:8px; width:1px; background:rgba(255,255,255,0.06); }
  .tl-it { display:flex; align-items:flex-start; gap:16px; padding-bottom:16px; }
  .tl-d { width:30px; display:flex; justify-content:center; margin-top:4px; }
  .dot { width:10px; height:10px; border-radius:50%; border:2px solid rgba(52,211,153,0.3); background:#34d399; }
  .tl-c { flex:1; display:flex; justify-content:space-between; align-items:center; }
  
  /* Announcement */
  .an-it { position:relative; overflow:hidden; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid rgba(255,255,255,0.06); padding:16px; }
  .an-bar { position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#BF00FF,#a78bfa); }
</style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div style="font-size:20px; font-weight:700;">Rama Hudson</div>
      <div style="font-size:11px; opacity:0.4;">Admin Puskesmas</div>
    </div>

    <!-- Riwayat -->
    <div>
      <div class="lb">Riwayat Absensi</div>
      <div class="card-glass">
        <div class="tl">
          <div class="tl-l"></div>
          <div class="tl-it">
            <div class="tl-d"><div class="dot"></div></div>
            <div class="tl-c">
              <span style="font-size:14px; font-weight:600;">Senin, 13 Jul</span>
              <span style="font-size:10px; padding:4px 10px; border-radius:999px; background:rgba(52,211,153,0.15); color:#6ee7b7; font-weight:700;">HADIR</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pengumuman -->
    <div>
      <div class="lb">Pengumuman</div>
      <div class="an-it">
        <div class="an-bar"></div>
        <div style="font-size:14px; font-weight:700;">Jadwal Posyandu Minggu Ini</div>
        <div style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px;">Posyandu dilaksanakan hari Rabu pukul 08.00 WITA.</div>
      </div>
    </div>
  </div>
</body>
</html>
