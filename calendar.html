<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone { width: 375px; height: 800px; background: linear-gradient(135deg, #f0f0ff, #e8e8f8); border-radius: 40px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 20px; font-weight: bold; }
        .nav-btns { display: flex; gap: 10px; }
        .nav-btn { width: 35px; height: 35px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .date-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .date-info h1 { margin: 0; font-size: 24px; }
        .subs { font-size: 12px; text-align: right; color: #555; }
        .calendar { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border-radius: 25px; padding: 20px; }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 10px; color: #888; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; text-align: center; }
        .day { font-size: 14px; position: relative; padding: 8px 0; }
        .day.active { background: #5e5ce6; color: white; border-radius: 10px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <div class="back-btn">&larr; Reminders</div>
            <div class="nav-btns"><div class="nav-btn">&lt;</div><div class="nav-btn">&gt;</div></div>
        </div>
        <div class="date-info">
            <h1>May 12, 2026</h1>
            <div class="subs">8 active<br>subscriptions</div>
        </div>
        <div class="calendar">
            <div class="days-header"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>
            <div class="grid">
                <!-- Simplified grid representation -->
                <div class="day">3<div class="dot" style="background:green"></div></div><div class="day">4</div><div class="day">5<div class="dot" style="background:green"></div></div><div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div>
                <div class="day">10</div><div class="day">11</div><div class="day active">12</div><div class="day">13</div><div class="day">14</div><div class="day">15<div class="dot" style="background:orange"></div></div><div class="day">16</div>
            </div>
        </div>
    </div>
</body>
</html>
