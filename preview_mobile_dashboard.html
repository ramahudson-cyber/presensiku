<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  body { background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .phone { 
    width: 375px; height: 812px; background: #000; 
    border-radius: 40px; position: relative; overflow: hidden; border: 1px solid #333;
    display: flex; flex-direction: column; color: white;
  }
  .phone::before, .phone::after {
    content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
  }
  .phone::before { top: -10%; left: -20%; width: 300px; height: 300px; background: #FF00FF; }
  .phone::after { bottom: -10%; right: -20%; width: 250px; height: 250px; background: #BF00FF; }
  .glow-extra {
    position: absolute; width: 200px; height: 200px; border-radius: 50%;
    filter: blur(100px); opacity: 0.6; background: #E000FF;
    top: 40%; left: 30%; z-index: 0;
  }
  .content { padding: 40px 20px 20px; flex: 1; position: relative; z-index: 1; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; }
  .val { font-size: 32px; font-weight: 700; margin-bottom: 20px; }
  .card { 
    background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); 
    padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
  }
  .glow { box-shadow: 0 0 30px rgba(0, 71, 171, 0.3); }
</style>
</head>
<body>
  <div class="phone">
    <div class="glow-extra"></div>
    <div class="content">
      <div class="header">
        <div class="avatar"></div>
        <div>Settings</div>
      </div>
      <div class="val">€10,250.75</div>
      <div class="card glow">Account Verifying</div>
      <div class="card">Top Performers</div>
    </div>
  </div>
</body>
</html>
