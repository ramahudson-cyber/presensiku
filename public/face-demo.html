<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Verifikasi Wajah</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000; color: white;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%; animation: gradientShift 15s ease infinite; z-index: 0;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .container {
      position: relative; z-index: 1; height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; padding-bottom: max(120px, env(safe-area-inset-bottom));
      max-width: 420px; margin: 0 auto;
    }
    .header { text-align: center; margin-bottom: 32px; transition: opacity 0.5s; }
    .header.hidden { opacity: 0; pointer-events: none; position: absolute; }
    .logo { width: 56px; height: 56px; margin: 0 auto 16px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; opacity: 0.5; }
    .camera-frame { position: relative; width: 260px; height: 260px; margin: 0 auto; opacity: 0; transition: opacity 0.5s; }
    .camera-frame.show { opacity: 1; }
    .camera-frame video { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; transform: scaleX(-1); }
    .pulse-ring { position: absolute; inset: -6px; border-radius: 24px; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s; }
    .pulse-ring.scanning { border-color: rgba(102, 126, 234, 0.6); animation: pulseRing 2s infinite; }
    .pulse-ring.success { border-color: #10b981; border-width: 3px; box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
    .pulse-ring.smile { border-color: #f59e0b; border-width: 4px; }
    @keyframes pulseRing { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.1); opacity: 0; } }
    .status-text { text-align: center; margin-top: 24px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; min-height: 20px; }
    .status-text.show { opacity: 0.9; }
    .status-text.error { opacity: 1; color: #fca5a5; }
    .status-text.hint { opacity: 1; color: #fcd34d; font-weight: 600; font-size: 16px; animation: pulseText 1.2s infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .btn-container { position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 100%; max-width: 360px; padding: 0 24px; z-index: 10; }
    .btn-start { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 16px 48px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3); width: 100%; }
    .btn-start:active { transform: scale(0.96); }
    .btn-start:disabled { opacity: 0.4; }
    .btn-capture { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15); padding: 14px 32px; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; }
    .btn-capture:disabled { opacity: 0.3; }
    .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    .result-overlay.show { display: flex; }
    .result-content { text-align: center; max-width: 320px; animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-icon-big { width: 72px; height: 72px; margin: 0 auto 16px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4); }
    .result-title-big { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .result-subtitle { font-size: 13px; opacity: 0.5; margin-bottom: 24px; }
    .btn-done { background: white; color: black; border: none; padding: 14px 40px; border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="container">
    <div class="header" id="header">
      <div class="logo">🔐</div>
      <h1>Verifikasi Wajah</h1>
      <p class="subtitle">Senyum untuk keamanan</p>
    </div>
    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="pulse-ring" id="pulseRing"></div>
    </div>
    <div class="status-text" id="statusText"></div>
  </div>
  <div class="btn-container">
    <button class="btn-start" id="startBtn" disabled>Memuat Model AI...</button>
    <button class="btn-capture" id="captureBtn" style="display:none;" disabled>Ambil Foto Manual</button>
  </div>
  <div class="result-overlay" id="resultOverlay">
    <div class="result-content">
      <div class="result-icon-big">✓</div>
      <div class="result-title-big">Verifikasi Berhasil</div>
      <div class="result-subtitle" id="resultSubtitle">Senyum terdeteksi</div>
      <button class="btn-done" onclick="resetAll()">Selesai</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    const video = document.getElementById('video');
    const cameraFrame = document.getElementById('cameraFrame');
    const pulseRing = document.getElementById('pulseRing');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const captureBtn = document.getElementById('captureBtn');
    const resultOverlay = document.getElementById('resultOverlay');
    const header = document.getElementById('header');
    
    let stream = null;
    let isVerifying = false;
    let detectionTimer = null;
    let isSmiling = false;
    let smileStartTime = 0;
    let lastSmileTime = 0;

    function showStatus(text, type = '') {
      statusText.className = 'status-text show ' + type;
      statusText.textContent = text;
    }

    async function loadModels() {
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
        ]);
        startBtn.textContent = 'Mulai Verifikasi';
        startBtn.disabled = false;
      } catch (err) {
        startBtn.textContent = 'Gagal Memuat. Refresh Halaman';
      }
    }

    async function startCamera() {
      try {
        startBtn.style.display = 'none';
        header.classList.add('hidden');
        showStatus('Mengaktifkan kamera...');

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } },
          audio: false
        });
        video.srcObject = stream;

        await new Promise(resolve => video.onloadeddata = resolve);
        video.play();

        cameraFrame.classList.add('show');
        pulseRing.className = 'pulse-ring scanning';

        isVerifying = true;
        detectionLoop();
      } catch (err) {
        showStatus('Gagal mengakses kamera', 'error');
        startBtn.style.display = 'block';
        header.classList.remove('hidden');
      }
    }

    async function detectionLoop() {
      if (!isVerifying) return;
      
      try {
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.3 }))
          .withFaceLandmarks()
          .withFaceExpressions();
        
        if (!detection) {
          captureBtn.disabled = true;
          pulseRing.className = 'pulse-ring scanning';
          showStatus('Wajah tidak terdeteksi', 'error');
          if (isVerifying) detectionTimer = setTimeout(detectionLoop, 100);
          return;
        }

        // === VALIDASI FULL FRAME KETAT ===
        const box = detection.detection.box;
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        
        // 1. Cek jika wajah terpotong (terlalu mepet tepi)
        const margin = 20; // 20 pixel dari tepi
        const isCropped = box.x < margin || box.y < margin || box.x + box.width > vw - margin || box.y + box.height > vh - margin;
        
        // 2. Cek jika wajah terlalu kecil (terlalu jauh)
        const isTooSmall = box.width < vw * 0.4 || box.height < vh * 0.4;
        
        if (isCropped || isTooSmall) {
          captureBtn.disabled = true;
          isSmiling = false; // Reset senyum
          pulseRing.className = 'pulse-ring scanning';
          
          if (isCropped) showStatus('Wajah terpotong! Posisikan full dahi-dagu', 'error');
          else if (isTooSmall) showStatus('Wajah terlalu kecil. Mendekatlah', 'error');
          
          if (isVerifying) detectionTimer = setTimeout(detectionLoop, 80);
          return;
        }

        // === WAJAH FULL FRAME VALID ===
        captureBtn.disabled = false;
        captureBtn.style.display = 'block';
        pulseRing.className = 'pulse-ring scanning';
        
        // === DETEKSI SENYUM ===
        const happyScore = detection.expressions.happy;
        const now = performance.now();

        if (happyScore > 0.7) {
          if (!isSmiling) {
            isSmiling = true;
            smileStartTime = now;
            pulseRing.className = 'pulse-ring smile';
          }
        } else {
          if (isSmiling) {
            const smileDuration = now - smileStartTime;
            isSmiling = false;
            pulseRing.className = 'pulse-ring scanning';
            
            if (smileDuration >= 200 && smileDuration <= 5000 && (now - lastSmileTime) > 1000) {
              lastSmileTime = now;
              await verificationSuccess();
              return;
            }
          }
        }

        if (!isSmiling) {
          showStatus('😊 Senyum ke kamera!', 'hint');
        } else {
          showStatus('Senyum terdeteksi...', 'hint');
        }
        
        if (isVerifying) detectionTimer = setTimeout(detectionLoop, 80);
      } catch (err) {
        if (isVerifying) detectionTimer = setTimeout(detectionLoop, 100);
      }
    }

    captureBtn.addEventListener('click', async () => {
      if (!isVerifying || captureBtn.disabled) return;
      await verificationSuccess();
    });

    async function verificationSuccess() {
      isVerifying = false;
      clearTimeout(detectionTimer);
      
      pulseRing.className = 'pulse-ring success';
      captureBtn.style.display = 'none';
      
      setTimeout(() => {
        resultOverlay.classList.add('show');
      }, 800);
      
      if (stream) {
        setTimeout(() => stream.getTracks().forEach(t => t.stop()), 1000);
      }
    }

    function resetAll() {
      resultOverlay.classList.remove('show');
      cameraFrame.classList.remove('show');
      pulseRing.className = 'pulse-ring';
      captureBtn.style.display = 'none';
      startBtn.style.display = 'block';
      header.classList.remove('hidden');
      isVerifying = false;
      isSmiling = false;
    }

    startBtn.addEventListener('click', startCamera);
    loadModels();
  </script>
</body>
</html>
