<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Verifikasi Absensi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000; color: white;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%; animation: gradientShift 15s ease infinite; z-index: 0;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .container {
      position: relative; z-index: 1; height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; padding-bottom: max(120px, env(safe-area-inset-bottom));
      max-width: 420px; margin: 0 auto;
    }
    .header { text-align: center; margin-bottom: 32px; transition: opacity 0.5s; }
    .header.hidden { opacity: 0; pointer-events: none; position: absolute; }
    .logo { width: 56px; height: 56px; margin: 0 auto 16px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; opacity: 0.5; }
    .camera-frame { position: relative; width: 220px; height: 220px; margin: 0 auto; opacity: 0; transition: opacity 0.5s; }
    .camera-frame.show { opacity: 1; }
    .camera-frame video { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; transform: scaleX(-1); }
    .pulse-ring { position: absolute; inset: -6px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s; }
    .pulse-ring.scanning { border-color: rgba(102, 126, 234, 0.6); animation: pulseRing 2s infinite; }
    .pulse-ring.success { border-color: #10b981; border-width: 3px; box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
    @keyframes pulseRing { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
    .status-text { text-align: center; margin-top: 24px; font-size: 14px; font-weight: 500; opacity: 0.9; min-height: 20px; }
    .btn-container { position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 100%; max-width: 360px; padding: 0 24px; z-index: 10; }
    .btn-start { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 16px 48px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3); width: 100%; }
    .btn-start:active { transform: scale(0.96); }
    .btn-capture { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 16px 32px; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
    .btn-capture:disabled { opacity: 0.3; }
    .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    .result-overlay.show { display: flex; }
    .result-content { text-align: center; max-width: 320px; animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-icon-big { width: 72px; height: 72px; margin: 0 auto 16px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4); }
    .result-title-big { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .result-subtitle { font-size: 13px; opacity: 0.5; margin-bottom: 24px; }
    .result-details { display: flex; gap: 20px; justify-content: center; margin-bottom: 28px; }
    .result-detail-value { font-weight: 700; font-size: 16px; }
    .result-detail-label { opacity: 0.4; font-size: 10px; text-transform: uppercase; }
    .btn-done { background: white; color: black; border: none; padding: 14px 40px; border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .hidden-canvas { display: none; }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="container">
    <div class="header" id="header">
      <div class="logo">📸</div>
      <h1>Absensi Selfie</h1>
      <p class="subtitle">SIAP Puskesmas Ampenan</p>
    </div>
    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="pulse-ring" id="pulseRing"></div>
    </div>
    <div class="status-text" id="statusText">Posisikan wajah di lingkaran</div>
  </div>
  <div class="btn-container">
    <button class="btn-start" id="startBtn">Mulai Absensi</button>
    <button class="btn-capture" id="captureBtn" style="display:none;">📸 Ambil Foto</button>
  </div>
  <div class="result-overlay" id="resultOverlay">
    <div class="result-content">
      <div class="result-icon-big">✓</div>
      <div class="result-title-big">Absensi Berhasil</div>
      <div class="result-subtitle" id="resultSubtitle">Bukti digital terverifikasi</div>
      <div class="result-details">
        <div><div class="result-detail-value" id="timeValue">-</div><div class="result-detail-label">Waktu</div></div>
        <div><div class="result-detail-value" id="gpsValue">-</div><div class="result-detail-label">GPS</div></div>
      </div>
      <button class="btn-done" onclick="resetAll()">Selesai</button>
    </div>
  </div>

  <canvas class="hidden-canvas" id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const cameraFrame = document.getElementById('cameraFrame');
    const pulseRing = document.getElementById('pulseRing');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const captureBtn = document.getElementById('captureBtn');
    const resultOverlay = document.getElementById('resultOverlay');
    const header = document.getElementById('header');
    const canvas = document.getElementById('canvas');
    
    let stream = null;

    async function startCamera() {
      try {
        startBtn.style.display = 'none';
        header.classList.add('hidden');
        statusText.textContent = 'Mengaktifkan kamera...';

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 640 } },
          audio: false
        });
        video.srcObject = stream;

        await new Promise(resolve => video.onloadeddata = resolve);
        video.play();

        cameraFrame.classList.add('show');
        pulseRing.className = 'pulse-ring scanning';
        captureBtn.style.display = 'block';
        statusText.textContent = 'Posisikan wajah di lingkaran';
      } catch (err) {
        statusText.textContent = 'Gagal mengakses kamera';
        startBtn.style.display = 'block';
        header.classList.remove('hidden');
      }
    }

    captureBtn.addEventListener('click', () => {
      captureBtn.disabled = true;
      captureBtn.textContent = 'Memproses...';
      
      // Draw video frame to canvas
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      
      // Mirror the image
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform

      // Add Watermark (Date & Time)
      const now = new Date();
      const dateStr = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
      const timeStr = now.toLocaleTimeString('id-ID');
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
      
      ctx.font = 'bold 24px Arial';
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.fillText(`SIAP Puskesmas Ampenan`, canvas.width / 2, canvas.height - 50);
      ctx.fillText(`${dateStr} - ${timeStr}`, canvas.width / 2, canvas.height - 20);

      // Simulate success (in real app, upload canvas.toDataURL('image/jpeg') to Supabase)
      setTimeout(() => {
        verificationSuccess(dateStr, timeStr);
      }, 500);
    });

    function verificationSuccess(date, time) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      
      pulseRing.className = 'pulse-ring success';
      captureBtn.style.display = 'none';
      statusText.textContent = 'Terverifikasi!';

      document.getElementById('timeValue').textContent = time;
      document.getElementById('gpsValue').textContent = 'Valid';
      document.getElementById('resultSubtitle').textContent = `${date} - ${time}`;
      
      setTimeout(() => {
        resultOverlay.classList.add('show');
      }, 800);
    }

    function resetAll() {
      resultOverlay.classList.remove('show');
      cameraFrame.classList.remove('show');
      pulseRing.className = 'pulse-ring';
      captureBtn.style.display = 'none';
      captureBtn.disabled = false;
      captureBtn.textContent = '📸 Ambil Foto';
      startBtn.style.display = 'block';
      header.classList.remove('hidden');
      statusText.textContent = 'Posisikan wajah di lingkaran';
    }

    startBtn.addEventListener('click', startCamera);
  </script>
</body>
</html>
