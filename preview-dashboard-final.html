<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1a1a1a] p-5">
    <div class="max-w-md mx-auto text-white p-6 rounded-3xl" style="background: linear-gradient(160deg, #BF00FF 0%, #4A148C 100%)">
        <!-- Status -->
        <div class="bg-white/5 border border-violet-500/30 rounded-2xl p-5 mb-5">
            <div class="text-xs text-white/60 uppercase mb-2">Status Absensi</div>
            <div class="text-[#adff2f] font-bold">● Sudah Absen</div>
            <div class="text-sm">Masuk: 07:30</div>
        </div>
        
        <!-- Shift -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 mb-5">
            <div class="text-xs text-white/60 mb-2">Jadwal Shift Hari Ini</div>
            <div class="font-bold">Shift Pagi (07:00 - 14:00)</div>
            <div class="text-xs text-white/50 mt-1">Puskesmas Ampenan</div>
        </div>
        
        <!-- History -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5">
            <div class="text-xs text-white/60 mb-3">Riwayat Terakhir</div>
            <div class="space-y-3">
                <div class="flex justify-between items-center border-b border-white/5 pb-2">
                    <span class="text-sm">2026-07-12</span>
                    <span class="text-xs bg-green-500/20 text-green-300 px-2 py-1 rounded-full">Hadir</span>
                </div>
                <div class="flex justify-between items-center pb-1">
                    <span class="text-sm">2026-07-11</span>
                    <span class="text-xs bg-green-500/20 text-green-300 px-2 py-1 rounded-full">Hadir</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
