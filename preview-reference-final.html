<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(180deg, #8A2BE2 0%, #4B0082 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }
        .main-container { background: #121212; border-radius: 40px; }
        .purple-card { background: #5800fd; }
        .glass-dark { background: #1c1c1c; }
        .glass-box { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">
    <div class="main-container w-full max-w-sm p-4 text-white shadow-2xl">
        <!-- Header Profile -->
        <div class="purple-card rounded-[32px] p-6 mb-4">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-16 h-16 rounded-full bg-slate-300 border-2 border-white"></div>
                <div class="flex gap-6">
                    <div class="text-center">
                        <div class="font-bold text-lg">10.8M</div>
                        <div class="text-xs opacity-70">Followers</div>
                    </div>
                    <div class="text-center">
                        <div class="font-bold text-lg">178.4K</div>
                        <div class="text-xs opacity-70">Supporters</div>
                    </div>
                </div>
            </div>
            <div class="mb-6">
                <h2 class="text-xl font-bold">Rodriguez <span class="text-xs bg-white text-purple-600 px-1 rounded-full">✓</span></h2>
                <p class="text-xs opacity-80">@rodriguezojonson</p>
                <p class="text-xs mt-2 opacity-90">Biggest Host on Social Media 🔑 LA</p>
            </div>
            <div class="flex gap-2">
                <button class="bg-white text-purple-700 px-6 py-2 rounded-full text-sm font-bold flex-1">Follow</button>
                <button class="bg-purple-900 border border-white/20 px-6 py-2 rounded-full text-sm font-bold flex-1">Subscribe</button>
                <button class="bg-purple-900 border border-white/20 px-4 py-2 rounded-full text-sm font-bold">...</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="glass-dark rounded-full p-1 flex mb-4">
            <button class="bg-white text-black px-8 py-3 rounded-full text-sm font-bold flex-1">Room 4</button>
            <button class="text-white px-8 py-3 rounded-full text-sm font-bold flex-1 opacity-50">Questions 12</button>
        </div>

        <!-- Grid Cards -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-box h-48 rounded-3xl p-4 flex flex-col justify-between" style="background: linear-gradient(180deg, rgba(88,0,253,0.3) 0%, #1c1c1c 100%);">
                <span class="bg-orange-500 text-[10px] font-bold px-2 py-1 rounded-md w-fit">LIVE</span>
                <p class="font-bold text-sm">Nicholas <span class="opacity-60">✓</span></p>
            </div>
            <div class="glass-box h-48 rounded-3xl p-4 flex flex-col justify-between">
                <span class="opacity-50">🎥</span>
                <p class="text-[11px] opacity-80">6/12 10AM Q&A Sunday + new limited edition hoodie giveaway</p>
            </div>
        </div>
    </div>
</body>
</html>
