<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembur</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e91e63; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone { width: 375px; background: #d32f2f; border-radius: 40px; overflow: hidden; height: 800px; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .header { background: #d32f2f; color: white; padding: 50px 20px 40px; display: flex; align-items: center; gap: 20px; font-size: 18px; font-weight: 600; }
        .content { padding: 20px; flex: 1; overflow-y: auto; background: #f9f9f9; border-top-left-radius: 40px; border-top-right-radius: 40px; }
        .dropdown { background: white; padding: 15px; border-radius: 12px; border: 1px solid #eee; display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #eee; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .icon { background: #e0f2f1; color: #00897b; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 20px; }
        .info h4 { margin: 0; font-size: 16px; }
        .info p { margin: 2px 0 0; color: #777; font-size: 12px; }
        .status { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; position: absolute; right: 15px; }
        .dibatalkan { background: #eee; color: #757575; }
        .pending { background: #fff3e0; color: #fb8c00; }
        .tidak-disetujui { background: #ffebee; color: #e53935; }
        .disetujui { background: #e0f7fa; color: #00acc1; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header"><span>&larr;</span> Lembur</div>
        <div class="content">
            <div class="dropdown"><span>👤 Semua Karyawan</span> <span>&#9662;</span></div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div class="dropdown" style="flex:1">Kategori ▾</div>
                <div class="dropdown" style="flex:2">01 Sep - 30 Sep 2025 ▾</div>
            </div>
            
            <div class="item">
                <div class="icon">📄</div>
                <div class="info"><h4>Budi</h4><p>Permintaan Lembur<br>13 Sep 2024 00:00:00</p></div>
                <div class="status dibatalkan">Dibatalkan</div>
            </div>
            <div class="item">
                <div class="icon">📄</div>
                <div class="info"><h4>Budi</h4><p>Permintaan Lembur<br>13 Sep 2024 00:00:00</p></div>
                <div class="status pending">Pending</div>
            </div>
            <div class="item">
                <div class="icon">📄</div>
                <div class="info"><h4>Roni</h4><p>Permintaan Lembur<br>11 Sep 2024 00:00:00</p></div>
                <div class="status tidak-disetujui">Tidak Disetujui</div>
            </div>
        </div>
    </div>
</body>
</html>
