<!DOCTYPE html>
<html lang="id" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Preview — Premium Clean Stats Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); gap: 24px; flex-wrap: wrap;
  }

  /* ===== PREMIUM STATS CARD ===== */
  .stats-container {
    width: 400px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 32px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 4px 30px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  /* Ambient Background Effects */
  .stats-container::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(173, 255, 47, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .stats-container::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -100px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(191, 0, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Grid Pattern */
  .bg-grid {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    opacity: 0.5;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 1;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .badge-premium {
    background: linear-gradient(135deg, rgba(191, 0, 255, 0.15), rgba(119, 0, 204, 0.15));
    border: 1px solid rgba(191, 0, 255, 0.3);
    color: #d8b4fe;
  }

  /* Stat Items */
  .stat-items {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(255, 255, 255, 0.02);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .stat-item:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.03);
    border-color: rgba(255, 255, 255, 0.12);
  }

  .stat-item-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
    flex-shrink: 0;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.01em;
  }

  .stat-item-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    font-family: 'Courier New', monospace;
    letter-spacing: -0.5px;
  }

  .stat-percent {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.04);
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px currentColor; }
    50% { opacity: 0.7; box-shadow: 0 0 8px currentColor; }
  }

  /* Progress Section */
  .progress-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    padding: 20px;
  }

  .progress-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .progress-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
    flex-shrink: 0;
  }

  .progress-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    width: 40px;
    font-weight: 500;
  }

  .progress-bar-container {
    flex: 1;
    height: 6px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 100px;
    transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 16px currentColor;
  }

  .progress-value {
    font-size: 12px;
    font-weight: 600;
    color: currentColor;
    width: 28px;
    text-align: right;
    font-family: 'Courier New', monospace;
  }

  /* Phone Frame */
  .phone-frame {
    display: none; /* Hidden for desktop preview */
  }
</style>
</head>
<body>

<!-- ===== PREMIUM STATS CARD PREVIEW ===== -->
<div class="stats-container">
  <div class="bg-grid"></div>

  <div class="content">
    <!-- Card Header -->
    <div class="card-header">
      <div class="card-title">📊 Statistik</div>
      <div class="badge badge-premium">✨ Total: 2</div>

    <!-- Stat Items -->
    <div class="stat-items">
      <!-- Hadir -->
      <div class="stat-item" style="border-color: rgba(173, 255, 47, 0.15);">

          <div class="stat-dot" style="color: #adff2f; background: #adff2f;"></div>
          <div class="stat-label">Hadir</div>
        </div>
        <div class="stat-item-right">
          <div class="stat-value" style="color: #fff;">2</div>
          <div class="stat-percent" style="color: #adff2f;">10%</div>
        </div>
      </div>

      <!-- Izin -->
      <div class="stat-item" style="border-color: rgba(251, 191, 36, 0.15);">
        <div class="stat-item-left">
          <div class="stat-dot" style="color: #fbbf24; background: #fbbf24;"></div>
          <div class="stat-label">Izin</div>
        </div>
        <div class="stat-item-right">
          <div class="stat-value" style="color: #fff;">0</div>
          <div class="stat-percent" style="color: #fbbf24;">0%</div>
        </div>
      </div>

      <!-- Sakit -->
      <div class="stat-item" style="border-color: rgba(251, 146, 60, 0.15);">
        <div class="stat-item-left">
          <div class="stat-dot" style="color: #fb923c; background: #fb923c;"></div>
          <div class="stat-label">Sakit</div>
        </div>
        <div class="stat-item-right">
          <div class="stat-value" style="color: #fff;">0</div>
          <div class="stat-percent" style="color: #fb923c;">0%</div>
        </div>
      </div>

      <!-- Alpha -->
      <div class="stat-item" style="border-color: rgba(248, 113, 113, 0.15);">
        <div class="stat-item-left">
          <div class="stat-dot" style="color: #f87171; background: #f87171;"></div>
          <div class="stat-label">Alpha</div>
        </div>
        <div class="stat-item-right">
          <div class="stat-value" style="color: #fff;">0</div>
          <div class="stat-percent" style="color: #f87171;">0%</div>
        </div>
      </div>
    </div>

    <!-- Progress Card -->
    <div class="progress-card">
      <div class="progress-section">
        <div class="progress-item">
          <div class="progress-dot" style="color: #adff2f;"></div>
          <div class="progress-label">Hadir</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 100%; background: linear-gradient(90deg, #adff2f, rgba(173, 255, 47, 0.4)); color: #adff2f;"></div>
          </div>
          <div class="progress-value" style="color: #adff2f;">2</div>
        </div>

        <div class="progress-item">
          <div class="progress-dot" style="color: #fbbf24; box-shadow: none;"></div>
          <div class="progress-label">Izin</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 0%; background: linear-gradient(90deg, #fbbf24, rgba(251, 191, 36, 0.4)); color: #fbbf24;"></div>
          </div>
          <div class="progress-value" style="color: #fbbf24;">0</div>
        </div>

        <div class="progress-item">
          <div class="progress-dot" style="color: #fb923c; box-shadow: none;"></div>
          <div class="progress-label">Sakit</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 0%; background: linear-gradient(90deg, #fb923c, rgba(251, 146, 60, 0.4)); color: #fb923c;"></div>
          </div>
          <div class="progress-value" style="color: #fb923c;">0</div>
        </div>

        <div class="progress-item">
          <div class="progress-dot" style="color: #f87171; box-shadow: none;"></div>
          <div class="progress-label">Alpha</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: 0%; background: linear-gradient(90deg, #f87171, rgba(248, 113, 113, 0.4)); color: #f87171;"></div>
          </div>
          <div class="progress-value" style="color: #f87171;">0</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
