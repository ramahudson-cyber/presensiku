<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Decisions Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05140b;
            --accent: #47e281;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: #121212; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .phone {
            width: 375px;
            height: 812px;
            background: linear-gradient(180deg, #0a2417 0%, #050a08 100%);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            border: 8px solid #1a1a1a;
            padding: 24px;
            box-sizing: border-box;
        }
        /* Dynamic Island Shadow */
        .island {
            width: 110px;
            height: 35px;
            background: #000;
            border-radius: 20px;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            padding: 0 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 48px; height: 48px; border-radius: 50%; 
            background: url('https://i.pravatar.cc/100?u=emily') center/cover;
            border: 1px solid var(--border-glass);
        }
        .profile-text p { margin: 0; font-size: 13px; color: #888; }
        .profile-text h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .notif {
            width: 44px; height: 44px; border-radius: 50%;
            border: 1px solid var(--border-glass);
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(71, 226, 129, 0.1), transparent);
        }

        .title { margin: 40px 0; }
        .title h1 { font-size: 32px; font-weight: 600; line-height: 1.1; margin: 0; letter-spacing: -1px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 28px;
            padding: 20px;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .card-header { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #aaa; margin-bottom: 15px; }
        .icon-box { width: 24px; height: 24px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .rate { font-size: 24px; font-weight: 700; margin: 0; }
        .change { font-size: 12px; color: #666; margin-top: 4px; }
        .change.up { color: #888; }

        .chart-container { height: 60px; margin-top: 20px; position: relative; }
        .svg-chart { width: 100%; height: 100%; overflow: visible; }
        .chart-path { fill: none; stroke-width: 2; stroke-linecap: round; }
        .glow { filter: drop-shadow(0 0 5px currentColor); }

        .nav {
            position: absolute;
            bottom: 25px; left: 20px; right: 20px;
            height: 76px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid var(--border-glass);
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px;
        }
        .nav-link { color: #555; text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .nav-link.active { color: var(--accent); }
        .nav-btn-center {
            width: 56px; height: 56px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(71, 226, 129, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="island"></div>
        <div class="status-bar">
            <span>9:30 PM</span>
            <div style="display:flex; gap:5px;">📶 🔋</div>
        </div>

        <div class="header">
            <div class="profile">
                <div class="avatar"></div>
                <div class="profile-text"><p>Hi, Emily!</p><h3>Smart Tracking</h3></div>
            </div>
            <div class="notif">🔔</div>
        </div>

        <div class="title"><h1>Simplify Mortgage<br>Decisions</h1></div>

        <div class="grid">
            <!-- Card 1 -->
            <div class="card">
                <div class="card-header"><div class="icon-box">📅</div> 30 Year Fixed</div>
                <h2 class="rate">6.78%</h2>
                <div class="change">+0.01%</div>
                <div class="chart-container">
                    <svg class="svg-chart"><path class="chart-path glow" d="M0,40 Q20,10 40,30 T80,10 T120,40 T160,20" stroke="#47e281"/></svg>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="card">
                <div class="card-header"><div class="icon-box">📅</div> FHA 30 Fixed</div>
                <h2 class="rate">6.29%</h2>
                <div class="change">+0.01%</div>
                <div class="chart-container">
                    <svg class="svg-chart"><path class="chart-path glow" d="M0,20 Q30,50 60,10 T120,30 T160,5" stroke="#d4ff00"/></svg>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="card">
                <div class="card-header"><div class="icon-box">📅</div> VA 30 Fixed</div>
                <h2 class="rate">6.30%</h2>
                <div class="change">0%</div>
                <div class="chart-container">
                    <svg class="svg-chart"><path class="chart-path glow" d="M0,35 Q40,15 80,45 T160,25" stroke="#9d50bb"/></svg>
                </div>
            </div>
            <!-- Card 4 -->
            <div class="card">
                <div class="card-header"><div class="icon-box">📅</div> Jumbo Fixed</div>
                <h2 class="rate">6.89%</h2>
                <div class="change">0%</div>
                <div class="chart-container">
                    <svg class="svg-chart"><path class="chart-path glow" d="M0,45 Q40,5 80,35 T160,40" stroke="#00d2ff"/></svg>
                </div>
            </div>
        </div>

        <div class="nav">
            <a href="#" class="nav-link active">🏠 Home</a>
            <div class="nav-btn-center">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M4 12l16 0M12 4l0 16"/></svg>
            </div>
            <a href="#" class="nav-link">👤 Profile</a>
        </div>
    </div>
</body>
</html>
