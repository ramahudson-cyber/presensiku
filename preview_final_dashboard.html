<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: radial-gradient(circle at top left, #33004D, #060311);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #fff; padding: 20px;
  }
  .app { max-width:400px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
  
  /* Hero */
  .hero { 
    background: linear-gradient(135deg, #660099, #060311);
    border-radius: 24px; padding: 20px; color: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .avatar { width:62px; height:62px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:20px; }
  .btn-absen { background:rgba(255,255,255,0.05); padding:6px 16px; border-radius:999px; font-size:11px; font-weight:600; text-decoration:none; color:white; }

  /* Glass Card */
  .card-glass { 
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px; padding: 16px;
  }
  .lb { font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
</style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="avatar">RH</div>
        <div>
          <div style="font-size:11px; opacity:0.5; text-transform:uppercase;">SELAMAT SIANG</div>
          <div style="font-size:20px; font-weight:700;">Rama Hudson</div>
        </div>
      </div>
      <div style="margin-top:20px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
        <div style="font-size:11px; opacity:0.4;">Minggu, 13 Juli 2026</div>
        <a class="btn-absen">Absen Sekarang</a>
      </div>
    </div>

    <div class="card-glass">
      <div class="lb">Status Hari Ini</div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:48px; height:48px; border-radius:50%; background:rgba(191,0,255,0.1); display:flex; align-items:center; justify-content:center; color:#BF00FF;">✓</div>
        <div>
          <div style="font-weight:700;">Belum Absen</div>
          <div style="font-size:12px; color:rgba(255,255,255,0.4);">Tap untuk absen sekarang</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
