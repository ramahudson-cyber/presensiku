<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Preview — Welcome Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: linear-gradient(160deg, #BF00FF 0%, #9900CC 30%, #660099 70%, #33004D 100%);
  }
  .container {
    width: 100%; max-width: 400px; display: flex; flex-direction: column;
    min-height: 85vh; position: relative;
  }
  .orb {
    position: fixed; width: 300px; height: 300px; border-radius: 50%;
    background: #BF00FF; filter: blur(100px); opacity: 0.25;
    pointer-events: none; z-index: 0;
  }
  .orb-1 { top: -10%; left: -10%; }
  .orb-2 { bottom: -10%; right: -10%; }
  .content {
    position: relative; z-index: 1; width: 100%;
    display: flex; flex-direction: column; min-height: 85vh;
  }
  .top-section {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center;
  }
  h1 {
    font-size: clamp(52px, 12vw, 68px); font-weight: 600; color: #ffffff;
    letter-spacing: 0.5px; line-height: 1;
  }
  .tagline {
    font-size: 22px; color: rgba(255,255,255,0.7); margin-top: 16px;
    line-height: 1.4; font-weight: 400;
  }
  .subtitle {
    font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 24px;
    letter-spacing: 2.5px; text-transform: uppercase; font-weight: 300;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(135deg, #5800fd, #2415c6);
    color: #ffffff;
    border: none; border-radius: 9999px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(88,0,253,0.4);
    margin-top: 32px;
    width: auto;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary svg { width: 16px; height: 16px; }
  .bottom-section { padding-bottom: 12px; }
  .footer { margin-top: 0; }
  .footer-puskesmas { font-size: 12px; color: rgba(255,255,255,0.7); }
  .footer-version { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  @media (max-width: 639px) {
    .tagline, .subtitle { display: none; }
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="content">
      <div class="top-section">
        <h1>Presensiku</h1>
        <p class="tagline">
          Absen anti ribet,<br>
          kerja makin greget!
        </p>
        <p class="subtitle">Disiplin · Akurat · Optimal</p>
        <button class="btn-primary">
          Mulai Sekarang
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>

      <div class="bottom-section">
        <div class="footer">
          <p class="footer-puskesmas">Puskesmas Ampenan</p>
          <p class="footer-version">v1.6.9 — Presensiku</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
