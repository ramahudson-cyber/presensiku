<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final BG Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Inter', sans-serif; 
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    /* This is the gradient applied to the app */
    background: linear-gradient(135deg, #060311 0%, #1a0b2e 50%, #4a2580 100%); 
    color: white;
  }
  .card { 
    padding: 40px; 
    border-radius: 40px; 
    background: rgba(255,255,255,0.05); 
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Background Utama</h1>
    <p style="opacity: 0.6; margin-top: 10px;">Varian 2: Electric Dusk</p>
  </div>
</body>
</html>
