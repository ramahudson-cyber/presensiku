<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Decisions Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040d08;
            --accent: #4ade80;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
        }
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: white; -webkit-font-smoothing: antialiased; }
        .phone { width: 375px; height: 812px; background: linear-gradient(180deg, #081e14 0%, #040806 100%); border-radius: 54px; position: relative; overflow: hidden; border: 12px solid #1a1a1a; padding: 24px; box-sizing: border-box; }
        .island { width: 120px; height: 36px; background: #000; border-radius: 20px; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .status-bar { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; padding: 10px 15px 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-top: 35px; }
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid rgba(74, 222, 128, 0.3); background: url('https://i.pravatar.cc/100?u=emily') center/cover; }
        .profile-text p { margin: 0; font-size: 13px; color: #71717a; font-weight: 500; }
        .profile-text h3 { margin: 0; font-size: 15px; font-weight: 700; color: #fff; }
        .notif { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); }
        .title { margin: 35px 0 30px; }
        .title h1 { font-size: 34px; font-weight: 600; line-height: 1.1; margin: 0; letter-spacing: -1.2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 18px; position: relative; backdrop-filter: blur(20px); }
        .card-header { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #94a3b8; font-weight: 600; margin-bottom: 12px; }
        .icon-box { width: 32px; height: 32px; background: rgba(255,255,255,0.06); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .rate { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .change { font-size: 12px; color: #475569; margin-top: 2px; }
        .chart-container { height: 60px; margin-top: 15px; position: relative; }
        .svg-chart { width: 100%; height: 100%; overflow: visible; }
        .chart-path { fill: none; stroke-width: 2.5; stroke-linecap: round; filter: drop-shadow(0 0 8px currentColor); }
        .nav { position: absolute; bottom: 25px; left: 20px; right: 20px; height: 72px; background: rgba(12, 12, 12, 0.85); backdrop-filter: blur(30px); border-radius: 36px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: #52525b; text-decoration: none; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .nav-link.active { color: var(--accent); }
        .nav-btn-center { width: 54px; height: 54px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(74, 222, 128, 0.4); transform: translateY(-4px); }
    </style>
</head>
<body>
    <div class="phone">
        <div class="island"></div>
        <div class="status-bar"><span>9:30</span> <div style="display:flex;gap:4px">📶 🔋</div></div>
        <div class="header">
            <div class="profile">
                <div class="avatar"></div>
                <div class="profile-text"><p>Hi, Emily!</p><h3>Smart Tracking</h3></div>
            </div>
            <div class="notif">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
        </div>
        <div class="title"><h1>Simplify Mortgage<br>Decisions</h1></div>
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
                    30 Year Fixed
                </div>
                <h2 class="rate">6.78%</h2><div class="change">+0.01%</div>
                <div class="chart-container"><svg class="svg-chart"><path class="chart-path" d="M0,45 C20,10 40,30 60,15 S120,45 160,25" stroke="#4ade80"/></svg></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d4ff00" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
                    FHA 30 Fixed
                </div>
                <h2 class="rate">6.29%</h2><div class="change">+0.01%</div>
                <div class="chart-container"><svg class="svg-chart"><path class="chart-path" d="M0,25 C30,55 60,10 90,30 S130,5 160,15" stroke="#d4ff00"/></svg></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
                    VA 30 Fixed
                </div>
                <h2 class="rate">6.30%</h2><div class="change">0%</div>
                <div class="chart-container"><svg class="svg-chart"><path class="chart-path" d="M0,40 C40,15 80,45 120,20 S160,30" stroke="#a855f7"/></svg></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="icon-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
                    Jumbo Fixed
                </div>
                <h2 class="rate">6.89%</h2><div class="change">0%</div>
                <div class="chart-container"><svg class="svg-chart"><path class="chart-path" d="M0,45 C40,5 80,35 120,40 S160,25" stroke="#0ea5e9"/></svg></div>
            </div>
        </div>
        <div class="nav">
            <a href="#" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
            <div class="nav-btn-center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
            <a href="#" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Profile</a>
        </div>
    </div>
</body>
</html>
