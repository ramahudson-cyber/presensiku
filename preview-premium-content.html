<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Dashboard Content</title>
<style>
  body { background: linear-gradient(135deg, #ffffff 0%, #fdf4ff 30%, #f5d0fe 100%); font-family: 'Inter', sans-serif; padding: 20px; }
  .premium-card {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 32px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .stat-item { background: rgba(255,255,255,0.8); padding: 16px; border-radius: 24px; text-align: center; }
  .history-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
</style>
</head>
<body>
  <div class="premium-card">
    <h3 style="margin-bottom: 16px;">Statistik Performa</h3>
    <div class="stat-grid">
      <div class="stat-item"><strong>98%</strong><br><small>Kehadiran</small></div>
      <div class="stat-item"><strong>0</strong><br><small>Terlambat</small></div>
    </div>
  </div>

  <div class="premium-card">
    <h3 style="margin-bottom: 16px;">Riwayat Terbaru</h3>
    <div class="history-item"><span>14 Jul</span> <span>08:00</span> <span>Hadir</span></div>
    <div class="history-item"><span>13 Jul</span> <span>08:05</span> <span>Hadir</span></div>
  </div>

  <div class="premium-card">
    <h3 style="margin-bottom: 16px;">Pengumuman Penting</h3>
    <p style="font-size: 14px; color: #444;">Pembaruan sistem absensi akan dilakukan pada hari Sabtu pukul 22:00 WITA.</p>
  </div>
</body>
</html>
