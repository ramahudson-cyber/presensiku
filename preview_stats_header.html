<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(circle at 20% 20%, #2d0b4a, #060311 80%);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    --bg: radial-gradient(circle at 20% 20%, #2d0b4a, #060311 80%);
  }
  .phone { width: 375px; display: flex; flex-direction: column; gap: 16px; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding-left: 25px;
    padding-right: 24px;
  }
  .section-icon {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    background: rgba(191, 0, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(191, 0, 255, 0.3);
  }
  /* Ikon Grafik Premium */
  .icon-wrapper {
    width: 24px;
    height: 24px;
  }
  .section-text { flex: 1; padding-top: 4px; }
  .section-title { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; color: #ffffff; line-height: 1.15; }
  .section-tagline { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.35); margin-top: 2px; }
</style>
</head>
<body>
<div class="phone">
  <div class="section-header">
    <div class="section-icon">
       <!-- Premium Chart Icon (SVG) -->
       <svg class="icon-wrapper" viewBox="0 0 24 24" fill="none" stroke="#BF00FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
       </svg>
    </div>
    <div class="section-text">
      <div class="section-title">Statistik bulan ini</div>
      <div class="section-tagline">Ringkasan kehadiran anda bulan ini</div>
    </div>
  </div>
</div>
</body>
</html>
