<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8F9FE] p-6">
    <div class="max-w-md mx-auto min-h-screen">
        <!-- Header -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <p class="text-slate-400 text-sm font-medium mb-1">Selamat Pagi,</p>
                <h1 class="text-2xl font-bold text-slate-800">Rama Hudson</h1>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">RH</div>
        </div>

        <!-- Main Card -->
        <div class="relative bg-white rounded-3xl p-6 mb-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Status Absensi</span>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-emerald-600 text-xs font-bold">Aktif</span>
                </div>
            </div>
            <div class="text-4xl font-black text-slate-800 mb-1">07:30</div>
            <p class="text-slate-500 text-sm">Waktu masuk hari ini</p>
        </div>
        
        <!-- Grid -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs mb-1">Shift</p>
                <p class="font-bold text-slate-800">07:00</p>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs mb-1">Lokasi</p>
                <p class="font-bold text-slate-800">Ampenan</p>
            </div>
        </div>

        <!-- History -->
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="text-slate-800 font-bold mb-4">Riwayat Terakhir</h3>
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 font-medium">12</div>
                        <span class="text-slate-600 font-medium">Hadir</span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 font-medium">11</div>
                        <span class="text-slate-600 font-medium">Hadir</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="fixed bottom-6 left-6 right-6 flex gap-3">
            <button class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-200">Absen Masuk</button>
            <button class="bg-white text-slate-800 font-bold py-4 px-6 rounded-2xl border border-slate-200">Riwayat</button>
        </div>
    </div>
</body>
</html>
