<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: background 0.4s;
    --bg: radial-gradient(circle at 20% 20%, #2d0b4a, #060311 80%);
  }
  body.light {
    --bg: linear-gradient(135deg, #f8fafc, #f1f5f9);
  }
  .toggle-btn {
    margin-bottom: 20px;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Inter', sans-serif;
  }
  body.light .toggle-btn { border-color: rgba(0,0,0,0.15); color: #0f172a; background: rgba(0,0,0,0.03); }
  .toggle-btn:hover { transform: scale(1.02); }
  .phone {
    width: 375px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* SECTION TITLE — di luar card */
  .section-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0 25px;
  }
  .section-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #ffffff;
    line-height: 1.15;
  }
  body.light .section-title { color: #0f172a; }
  .section-tagline {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.01em;
  }
  body.light .section-tagline { color: rgba(0,0,0,0.3); }
    background: linear-gradient(135deg, #BF00FF, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .section-title-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(191,0,255,0.08);
    border: 1px solid rgba(191,0,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* CARD WRAPPER */
  .card {
    background: rgba(10, 5, 25, 0.6);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(191, 0, 255, 0.08), 0 0 0 1px rgba(255,255,255,0.03) inset;
  }
  
  .glow-orb { position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; }
  .glow-orb-1 { width: 180px; height: 180px; background: rgba(191, 0, 255, 0.12); top: -60px; right: -40px; }
  .glow-orb-2 { width: 140px; height: 140px; background: rgba(173, 255, 47, 0.06); bottom: -30px; left: -40px; }

  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #BF00FF, #a78bfa, #ADFF2F, transparent);
    background-size: 200% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 0%; }
    50% { background-position: 100% 0%; }
  }

  /* DONUT SECTION */
  .donut-section {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    padding: 16px;
    background: rgba(255,255,255,0.02);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
    z-index: 1;
  }
  .donut-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .donut-svg { width: 80px; height: 80px; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .donut-center-val {
    font-size: 20px; font-weight: 700; line-height: 1;
    background: linear-gradient(135deg, #ffffff, rgba(255,255,255,0.6));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .donut-center-lb { font-size: 6px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.4; margin-top: 2px; }
  .donut-legend { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 9px; }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .legend-val { font-weight: 600; margin-left: auto; }

  /* BAR CHART */
  .chart-section {
    margin-bottom: 20px;
    padding: 16px;
    background: rgba(255,255,255,0.02);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
    z-index: 1;
  }
  .chart-bars { display: flex; align-items: flex-end; gap: 10px; height: 100px; }
  .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .chart-col-val { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .chart-bar-wrap { width: 100%; border-radius: 8px 8px 4px 4px; position: relative; overflow: hidden; }
  .chart-bar-glow {
    position: absolute; top: 0; left: -50%; width: 200%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: barGlow 3s ease-in-out infinite;
  }
  @keyframes barGlow {
    0%, 100% { transform: translateX(-30%); }
    50% { transform: translateX(30%); }
  }
  .chart-col-lb { font-size: 7px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.4; margin-top: 8px; }
  .chart-col-pct { font-size: 7px; opacity: 0.3; margin-top: 2px; }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    position: relative;
    z-index: 1;
  }
  .stat-item {
    background: rgba(255,255,255,0.02);
    border-radius: 16px;
    padding: 14px 6px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .stat-item:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.1); }
  .stat-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 8px;
    right: 8px;
    height: 2px;
    border-radius: 0 0 4px 4px;
  }
  .stat-item.hadir::before { background: linear-gradient(90deg, #ADFF2F, #7FFF00); box-shadow: 0 0 12px rgba(173,255,47,0.3); }
  .stat-item.izin::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); box-shadow: 0 0 12px rgba(251,191,36,0.2); }
  .stat-item.sakit::before { background: linear-gradient(90deg, #fb923c, #f97316); box-shadow: 0 0 12px rgba(251,146,60,0.2); }
  .stat-item.alpha::before { background: linear-gradient(90deg, #f87171, #ef4444); box-shadow: 0 0 12px rgba(248,113,113,0.2); }

  .stat-value { font-size: 26px; font-weight: 200; letter-spacing: -1px; line-height: 1; margin-bottom: 2px; }
  .stat-label { font-size: 7px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.5; }
  .stat-pct { font-size: 8px; font-weight: 600; opacity: 0.25; margin-top: 4px; }
  
  /* Particles */
  .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(255,255,255,0.15); pointer-events: none; }
  .p1 { top: 15%; right: 20%; animation: float 8s ease-in-out infinite; }
  .p2 { top: 45%; right: 10%; animation: float 6s ease-in-out infinite 2s; width: 1px; height: 1px; }
  .p3 { bottom: 25%; left: 15%; animation: float 7s ease-in-out infinite 1s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
    50% { transform: translateY(-20px) scale(1.5); opacity: 0.4; }
  }
</style>
</head>
<body>
<button class="toggle-btn" onclick="document.body.classList.toggle('light')">🌗 Toggle Light / Dark</button>
<div class="phone">
  <!-- SECTION TITLE — di luar card -->
  <div class="section-title-wrap">
    <div class="section-title">Statistik bulan ini</div>
    <div class="section-tagline">Ringkasan kehadiran anda bulan ini</div>
  </div>
    <div class="section-title-line"></div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="accent-top"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>

    <!-- DONUT -->
    <div class="donut-section">
      <div class="donut-wrap">
        <svg class="donut-svg" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="6"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="#ADFF2F" stroke-width="6" stroke-dasharray="150.8 50.2" stroke-dashoffset="0" transform="rotate(-90, 40, 40)" stroke-linecap="round" style="filter: drop-shadow(0 0 6px rgba(173,255,47,0.4));"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="#fbbf24" stroke-width="6" stroke-dasharray="25 175.8" stroke-dashoffset="-150.8" transform="rotate(-90, 40, 40)" stroke-linecap="round"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="#fb923c" stroke-width="6" stroke-dasharray="25 175.8" stroke-dashoffset="-175.8" transform="rotate(-90, 40, 40)" stroke-linecap="round"/>
          <circle cx="40" cy="40" r="22" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
        </svg>
        <div class="donut-center">
          <div class="donut-center-val">3</div>
          <div class="donut-center-lb">total</div>
        </div>
      </div>
      <div class="donut-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#ADFF2F"></span> Hadir <span class="legend-val" style="color:#ADFF2F">1</span></div>
        <div class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span> Izin <span class="legend-val" style="color:#fbbf24">0</span></div>
        <div class="legend-item"><span class="legend-dot" style="background:#fb923c"></span> Sakit <span class="legend-val" style="color:#fb923c">0</span></div>
        <div class="legend-item"><span class="legend-dot" style="background:#f87171"></span> Alpha <span class="legend-val" style="color:#f87171">0</span></div>
      </div>
    </div>

    <!-- BAR CHART -->
    <div class="chart-section">
      <div class="chart-bars">
        <div class="chart-col">
          <div class="chart-col-val" style="color:#ADFF2F">1</div>
          <div class="chart-bar-wrap" style="height:75%; background:linear-gradient(180deg, #ADFF2F, rgba(173,255,47,0.15)); box-shadow: 0 0 20px rgba(173,255,47,0.15);">
            <div class="chart-bar-glow"></div>
          </div>
          <div class="chart-col-lb">Hadir</div>
          <div class="chart-col-pct">75%</div>
        </div>
        <div class="chart-col">
          <div class="chart-col-val" style="color:#fbbf24">0</div>
          <div class="chart-bar-wrap" style="height:12%; background:linear-gradient(180deg, #fbbf24, rgba(251,191,36,0.15)); box-shadow: 0 0 12px rgba(251,191,36,0.1);">
            <div class="chart-bar-glow"></div>
          </div>
          <div class="chart-col-lb">Izin</div>
          <div class="chart-col-pct">0%</div>
        </div>
        <div class="chart-col">
          <div class="chart-col-val" style="color:#fb923c">0</div>
          <div class="chart-bar-wrap" style="height:12%; background:linear-gradient(180deg, #fb923c, rgba(251,146,60,0.15)); box-shadow: 0 0 12px rgba(251,146,60,0.1);">
            <div class="chart-bar-glow"></div>
          </div>
          <div class="chart-col-lb">Sakit</div>
          <div class="chart-col-pct">0%</div>
        </div>
        <div class="chart-col">
          <div class="chart-col-val" style="color:#f87171">0</div>
          <div class="chart-bar-wrap" style="height:8%; background:linear-gradient(180deg, #f87171, rgba(248,113,113,0.15));">
          </div>
          <div class="chart-col-lb">Alpha</div>
          <div class="chart-col-pct">0%</div>
        </div>
      </div>
    </div>

    <!-- STATS GRID -->
    <div class="stats-grid">
      <div class="stat-item hadir"><div class="stat-value" style="color:#ADFF2F">1</div><div class="stat-label">Hadir</div><div class="stat-pct">75%</div></div>
      <div class="stat-item izin"><div class="stat-value" style="color:#fbbf24">0</div><div class="stat-label">Izin</div><div class="stat-pct">0%</div></div>
      <div class="stat-item sakit"><div class="stat-value" style="color:#fb923c">0</div><div class="stat-label">Sakit</div><div class="stat-pct">0%</div></div>
      <div class="stat-item alpha"><div class="stat-value" style="color:#f87171">0</div><div class="stat-label">Alpha</div><div class="stat-pct">0%</div></div>
    </div>
  </div>
</div>
</body>
</html>
